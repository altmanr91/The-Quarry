name: The Quarry Pipeline

on:
  workflow_run:
    workflows: ["Daily CRE Digest"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarry:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download previous workbooks
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: quarry-data
          path: .

      - name: Run pipeline
        env:
          ONEDRIVE_CLIENT_ID:     ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
        run: python quarry_pipeline.py

      - name: Upload updated workbooks
        uses: actions/upload-artifact@v4
        with:
          name: quarry-data
          path: |
            comps.xlsx
            contacts.xlsx
          retention-days: 365
          overwrite: true
