name: The Quarry Pipeline

on:
  schedule:
    - cron: '0 11 * * *'  # 7:00 AM EDT — runs after App 1 has completed and deployed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarry:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ONEDRIVE_CLIENT_ID:     ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
        run: python quarry_pipeline.py

      - name: Upload workbooks as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: quarry-data
          path: |
            comps.xlsx
            contacts.xlsx
          retention-days: 90
          overwrite: true
